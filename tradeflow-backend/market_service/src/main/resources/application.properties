# 🖥️ Server Configuration
server.port=8085

# 🏷️ Spring Application Settings
spring.application.name=market-service

# Load root .env file natively
spring.config.import=optional:file:../../.env[.properties]

# 🗄️ Redis Configuration (for our 10-second price cache)
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Increase timeout to 5 seconds to handle high-frequency requests
spring.data.redis.timeout=5000ms

# 🛰️ Eureka Client Configuration
# This allows Order Service and Portfolio Service to find the Market Service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.hostname=localhost
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.ip-address=127.0.0.1

# 📝 Logging Configuration
# Set to DEBUG to see when we hit the cache vs. when we call Yahoo Finance
logging.level.com.tradeflow.market_service=DEBUG
logging.level.org.springframework.data.redis=INFO

# 🔍 Actuator Endpoints (Monitoring)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# 🧪 Custom App Properties (Optional: For our Mocking Logic)
# You can toggle this to 'true' if you want to force mock data during testing
app.market.force-mock=false


upstox.api.key=${UPSTOX_API_KEY}
upstox.api.secret=${UPSTOX_API_SECRET}
upstox.access.token=${UPSTOX_ACCESS_TOKEN}
upstox.redirect.uri=${UPSTOX_REDIRECT_URI}