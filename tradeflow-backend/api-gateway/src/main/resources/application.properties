# Basic Settings
server.port=8080
spring.application.name=api-gateway

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.hostname=localhost
eureka.instance.ip-address=127.0.0.1

# Routing Logic
# Requests to /api/v1/users/** will be forwarded to the user-service
spring.cloud.gateway.server.webmvc.routes[0].id=user-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://user-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/v1/users/**

# Requests to /api/v1/wallets/** will be forwarded to the wallet-service
spring.cloud.gateway.server.webmvc.routes[1].id=wallet-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://wallet-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/v1/wallets/**

# Requests to Auth, Login, and OAuth2 will be forwarded to the auth-service
spring.cloud.gateway.server.webmvc.routes[2].id=auth-service
spring.cloud.gateway.server.webmvc.routes[2].uri=http://localhost:9000
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/auth/**,/oauth2/**,/login/**,/error

# Requests to /api/v1/orders/** will be forwarded to the order-service
spring.cloud.gateway.server.webmvc.routes[3].id=order-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://order-service
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/v1/orders/**

# Requests to /api/v1/portfolio/** will be forwarded to the portfolio-service
spring.cloud.gateway.server.webmvc.routes[4].id=portfolio-service
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://portfolio-service
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/v1/portfolio/**

# Requests to /api/v1/market/** will be forwarded to the market-service
spring.cloud.gateway.server.webmvc.routes[5].id=market-service
spring.cloud.gateway.server.webmvc.routes[5].uri=lb://market-service
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/api/v1/market/**