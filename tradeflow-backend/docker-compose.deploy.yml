services:
  discovery-server:
    image: ghcr.io/hardikbhanot/tradeflow/discovery-server:latest
    ports: ["8761:8761"]
    env_file: .env
    environment:
      - JAVA_TOOL_OPTIONS=-XX:+UseSerialGC -Xmx150m -Xms150m
    restart: always

  api-gateway:
    image: ghcr.io/hardikbhanot/tradeflow/api-gateway:latest
    ports: ["8080:8080"]
    depends_on: [discovery-server]
    env_file: .env
    environment:
      - JAVA_TOOL_OPTIONS=-XX:+UseSerialGC -Xmx256m -Xms200m
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=prod
    restart: always

  auth-service:
    image: ghcr.io/hardikbhanot/tradeflow/auth-service:latest
    depends_on: [discovery-server, redis]
    env_file: .env
    environment:
      - JAVA_TOOL_OPTIONS=-XX:+UseSerialGC -Xmx256m -Xms200m
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATA_REDIS_HOST=redis
    restart: always

  user-service:
    image: ghcr.io/hardikbhanot/tradeflow/user_service:latest
    depends_on: [discovery-server]
    env_file: .env
    environment:
      - JAVA_TOOL_OPTIONS=-XX:+UseSerialGC -Xmx150m -Xms150m
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    restart: always

  wallet-service:
    image: ghcr.io/hardikbhanot/tradeflow/wallet_service:latest
    depends_on: [discovery-server]
    env_file: .env
    environment:
      - JAVA_TOOL_OPTIONS=-XX:+UseSerialGC -Xmx150m -Xms150m
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    restart: always

  market-service:
    image: ghcr.io/hardikbhanot/tradeflow/market_service:latest
    depends_on: [discovery-server, kafka, redis]
    env_file: .env
    environment:
      - JAVA_TOOL_OPTIONS=-XX:+UseSerialGC -Xmx256m -Xms200m
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATA_REDIS_HOST=redis
    restart: always

  portfolio-service:
    image: ghcr.io/hardikbhanot/tradeflow/portfolio_service:latest
    depends_on: [discovery-server, kafka, redis]
    env_file: .env
    environment:
      - JAVA_TOOL_OPTIONS=-XX:+UseSerialGC -Xmx200m -Xms150m
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATA_REDIS_HOST=redis
      - MARKET_SERVICE_URL=http://market-service:8085
    restart: always

  order-service:
    image: ghcr.io/hardikbhanot/tradeflow/order_service:latest
    depends_on: [discovery-server, kafka]
    env_file: .env
    environment:
      - JAVA_TOOL_OPTIONS=-XX:+UseSerialGC -Xmx150m -Xms150m
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    restart: always

  notification-service:
    image: ghcr.io/hardikbhanot/tradeflow/notification-service:latest
    depends_on: [discovery-server, kafka]
    env_file: .env
    environment:
      - JAVA_TOOL_OPTIONS=-XX:+UseSerialGC -Xmx150m -Xms150m
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    restart: always

  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: always

  redis:
    image: redis:alpine
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: tradeflow-prometheus
    ports: ["9090:9090"]
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    depends_on: [discovery-server]
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: tradeflow-grafana
    ports: ["3000:3000"]
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on: [prometheus]
    restart: always

volumes:
  prometheus-data:
  grafana-data: