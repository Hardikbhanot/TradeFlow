server.port=9000
spring.application.name=auth-service

# Eureka Setup
eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# Load .env file natively
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${AUTH_DB_URL:jdbc:postgresql://localhost:5432/neondb}
spring.datasource.username=${AUTH_DB_USERNAME:neondb_owner}
spring.datasource.password=${AUTH_DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

logging.level.org.hibernate.SQL=DEBUG

# Kafka Setup
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Upstox API
upstox.api.key=${UPSTOX_API_KEY}
upstox.api.secret=${UPSTOX_API_SECRET}
upstox.redirect.uri=${UPSTOX_REDIRECT_URI}

# -----------------------------
# 5. Monitoring (Prometheus & Health)
# -----------------------------
management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}