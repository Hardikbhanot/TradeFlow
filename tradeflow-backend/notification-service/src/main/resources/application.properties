server.port=8086
spring.application.name=notification-service
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

# Eureka Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# Kafka Configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=com.tradeflow.order_service.dto.NotificationEvent:com.tradeflow.notification_service.dto.NotificationEvent,com.tradeflow.wallet_service.dto.LedgerTransactionEvent:com.tradeflow.notification_service.dto.LedgerTransactionEvent,com.tradeflow.auth_service.dto.OtpRequestedEvent:com.tradeflow.notification_service.dto.OtpRequestedEvent


# SendGrid API Configuration (optional fallback)
sendgrid.api.key=${SENDGRID_API_KEY:}
sendgrid.from.email=${SENDGRID_FROM_EMAIL:no-reply@tradeflow.hbhanot.tech}

# SMTP Configuration for MailBluster / SMTP2GO
spring.mail.host=${SMTP_HOST:smtp.smtp2go.com}
spring.mail.port=${SMTP_PORT:2525}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.from=${SMTP_FROM:no-reply@tradeflow.hbhanot.tech}

# -----------------------------
# Monitoring (Prometheus & Health)
# -----------------------------
management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

