server.port=8086
spring.application.name=notification-service
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

# Eureka Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# Kafka Configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=com.tradeflow.order_service.dto.NotificationEvent:com.tradeflow.notification_service.dto.NotificationEvent,com.tradeflow.wallet_service.dto.LedgerTransactionEvent:com.tradeflow.notification_service.dto.LedgerTransactionEvent,com.tradeflow.auth_service.dto.OtpRequestedEvent:com.tradeflow.notification_service.dto.OtpRequestedEvent


# SendGrid API Configuration (Bypasses DigitalOcean SMTP Block)
sendgrid.api.key=${SENDGRID_API_KEY:}
sendgrid.from.email=${SENDGRID_FROM_EMAIL:no-reply@tradeflow.hbhanot.tech}

